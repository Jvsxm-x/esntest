<div class="calendar-container">
  <div class="header">
    <h1>Calendrier ESN - {{ currentYear }}</h1>
  </div>

  <div class="grid-container">
    <section class="holidays-section">
      <h2>Jours Fériés (API Nager.Date)</h2>
      <ul>
        <li *ngFor="let holiday of holidays">
          <span class="date">{{ holiday.date | date:'dd/MM/yyyy' }}</span>
          <span class="name">{{ holiday.name }}</span>
        </li>
      </ul>
    </section>

    <section class="festivals-section">
      <h2>Festivals et Événements</h2>
      <ul>
        <li *ngFor="let festival of festivals" [title]="festival.description">
          <span class="date">{{ festival.date | date:'dd/MM/yyyy' }}</span>
          <span class="name">{{ festival.name }}</span>
        </li>
      </ul>
    </section>
  </div>

  <section class="working-days-section">
    <h2>Calcul des jours ouvrables</h2>
    <div class="controls">
      <input type="date" [(ngModel)]="startDate" placeholder="Début">
      <input type="date" [(ngModel)]="endDate" placeholder="Fin">
      <button (click)="calculateWorkingDays(startDate, endDate)">Calculer</button>
      <p *ngIf="workingDaysCount > 0">Nombre de jours ouvrables : <strong>{{ workingDaysCount }}</strong></p>
    </div>
  </section>
</div>
